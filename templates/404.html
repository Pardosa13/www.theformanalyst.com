<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--surface-page);
            color: var(--text-primary);
            font-family: 'Outfit', system-ui, sans-serif;
        }

        .error-card {
            width: min(100%, 720px);
            background: var(--surface-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 32px;
            box-shadow: var(--shadow-2);
        }

        .error-code {
            margin: 0 0 12px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #f87171;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .error-actions a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
        }

        .error-actions .primary {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            color: var(--text-inverse);
        }

        .error-actions .secondary {
            background: var(--surface-card-raised);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <main class="error-card">
        <p class="error-code">404 · Page Not Found</p>
        <header class="ds-page-header" aria-labelledby="error-404-title">
            <div class="ds-page-header__content">
                <h1 class="ds-page-header__title" id="error-404-title">Lost in the void</h1>
                <p class="ds-page-header__description">We couldn't find the page you were looking for. Check the URL or jump back into the main dashboard.</p>
            </div>
        </header>
        <div class="error-actions">
            <a class="primary" href="/">Return home</a>
            <a class="secondary" href="javascript:history.back()">Go back</a>
        </div>
    </main>
</body>
</html>
