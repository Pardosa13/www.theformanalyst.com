{% block extra_js %}
<script>
// ── Globals ─────────────────────────────────────────────────────
const _SEASON = {{ player_stats_season }};
let _round = {{ current_round or 1 }};
let _home = '';
let _away = '';
let _venue = '';
let _teamSide = 'home';
let _allPlayers = [];
let _propStat = 'disposals';
let _selPlayerId = null;
let _selPlayer = null;
let _gameLog = [];
let _chartWin = 'all';

// ── Shared utils ─────────────────────────────────────────────────
function safeNum(v, fb = 0) {
  const n = Number(v);
  return Number.isFinite(n) ? n : fb;
}

function esc(v) {
  return String(v ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function norm(v) {
  return String(v ?? '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function mono(v) {
  return `<span style="font-family:'DM Mono',monospace;">${esc(v)}</span>`;
}

function capStat(stat) {
  return stat.charAt(0).toUpperCase() + stat.slice(1);
}

function avgFromGames(games, stat) {
  const vals = games.map(g => safeNum(g[stat], 0));
  return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '—';
}

function maxFromGames(games, stat) {
  const vals = games.map(g => safeNum(g[stat], 0));
  return vals.length ? Math.max(...vals) : '—';
}

function buildPlayerMap() {
  const map = new Map();
  _allPlayers.forEach(p => map.set(p.player_id, p));
  return map;
}

// ── Tab switching ────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.afl-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${name}`)?.classList.add('active');
  btn?.classList.add('active');
}

// ── Round navigation ─────────────────────────────────────────────
function changeRound(dir) {
  _round = Math.max(1, _round + dir);
  document.getElementById('roundLabel').textContent = `Round ${_round}`;
  resetPlayerState();

  fetch(`/api/afl/fixtures?year={{ year }}&round=${_round}`)
    .then(r => r.json())
    .then(data => {
      const sel = document.getElementById('matchSelector');
      sel.innerHTML = '<option value="">Select match...</option>';

      (data.games || []).forEach(f => {
        const opt = document.createElement('option');
        opt.value = `${f.hteam}|${f.ateam}|${f.venue || ''}`;
        opt.textContent = `${f.hteam} vs ${f.ateam}${f.venue ? ' · ' + f.venue : ''}`;
        sel.appendChild(opt);
      });

      document.getElementById('teamTabsWrap').style.display = 'none';
    })
    .catch(() => {});
}

// ── Match selector ───────────────────────────────────────────────
function onMatchSelect() {
  const val = document.getElementById('matchSelector').value;
  if (!val) {
    resetPlayerState();
    document.getElementById('teamTabsWrap').style.display = 'none';
    return;
  }

  const parts = val.split('|');
  _home = parts[0] || '';
  _away = parts[1] || '';
  _venue = parts[2] || '';

  const wrap = document.getElementById('teamTabsWrap');
  wrap.style.display = 'flex';
  document.getElementById('teamBtnHome').textContent = _home;
  document.getElementById('teamBtnAway').textContent = _away;

  selectTeam('home');
}

function selectTeam(side) {
  _teamSide = side;
  document.getElementById('teamBtnHome').className = `btn btn-sm ${side === 'home' ? 'btn-primary' : 'btn-secondary'}`;
  document.getElementById('teamBtnAway').className = `btn btn-sm ${side === 'away' ? 'btn-primary' : 'btn-secondary'}`;
  loadPlayerList(side === 'home' ? _home : _away);
}

// ── Player list ──────────────────────────────────────────────────
function loadPlayerList(team) {
  resetChart();

  const inner = document.getElementById('propPlayerListInner');
  inner.innerHTML = '<div class="prop-empty" style="padding:24px;"><span class="spinner-sm"></span></div>';

  const stat = document.getElementById('propStatSelect').value;

  fetch(`/api/afl/team-players?team=${encodeURIComponent(team)}&stat=${encodeURIComponent(stat)}&limit=35&season=${_SEASON}`)
    .then(r => r.json())
    .then(data => {
      _allPlayers = data.players || [];
      document.getElementById('playerCount').textContent = _allPlayers.length;
      renderPlayerList();
    })
    .catch(() => {
      inner.innerHTML = '<div class="prop-empty" style="padding:20px;color:var(--danger);font-size:12px;">Failed to load</div>';
    });
}

function renderPlayerList() {
  const inner = document.getElementById('propPlayerListInner');
  const stat = document.getElementById('propStatSelect').value;

  if (!_allPlayers.length) {
    inner.innerHTML = '<div class="prop-empty" style="padding:24px;"><p>No players found</p></div>';
    return;
  }

  inner.innerHTML = _allPlayers.map(player => {
    const avg = safeNum(player.averages?.[stat], 0);
    const selected = player.player_id === _selPlayerId ? 'selected' : '';

    return `
      <div class="prop-player-row ${selected}" id="prow-${player.player_id}" onclick="selectPlayer(${player.player_id})">
        <div>
          <div class="prow-name">${esc(player.name)}</div>
          <div class="prow-team">${esc(player.team)}</div>
        </div>
        <span class="prow-avg">${avg}</span>
      </div>
    `;
  }).join('');
}

function onStatChange() {
  _propStat = document.getElementById('propStatSelect').value;
  if (_allPlayers.length) renderPlayerList();
  if (_selPlayerId) selectPlayer(_selPlayerId);
}

// ── Player selection & chart ─────────────────────────────────────
function selectPlayer(id) {
  _selPlayerId = id;
  _selPlayer = _allPlayers.find(p => p.player_id === id) || null;

  document.querySelectorAll('.prop-player-row').forEach(r => r.classList.remove('selected'));
  document.getElementById(`prow-${id}`)?.classList.add('selected');

  const panel = document.getElementById('propChartPanel');
  panel.innerHTML = '<div class="prop-empty" style="padding:40px;"><span class="spinner-sm"></span></div>';

  let url = `/api/afl/player-detail?player_id=${id}&season=${_SEASON}`;
  if (_selPlayer?.team) {
    url += `&team=${encodeURIComponent(_selPlayer.team)}`;
  }

  fetch(url)
    .then(async r => {
      const data = await r.json();
      return { ok: r.ok, status: r.status, data };
    })
    .then(({ ok, status, data }) => {
      if (!ok) {
        if (status === 409 && data.matches?.length) {
          panel.innerHTML = `
            <div class="prop-empty" style="padding:30px;">
              <i class="bi bi-exclamation-triangle"></i>
              <p>Multiple players matched.</p>
              <div style="margin-top:12px;text-align:left;display:inline-block;">
                ${data.matches.map(m => `
                  <div style="margin:6px 0;">
                    <button class="btn btn-sm btn-secondary" onclick="selectPlayer(${m.player_id})">
                      ${esc(m.name)} · ${esc(m.team)}
                    </button>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
          return;
        }

        throw new Error(data?.error || 'Failed to load player');
      }

      renderPropCard(data);
    })
    .catch(() => {
      panel.innerHTML = '<div class="prop-empty" style="padding:40px;color:var(--danger);">Failed to load player data</div>';
    });
}

function renderPropCard(player) {
  const stat = document.getElementById('propStatSelect').value;
  const avgs = player.averages || {};
  _gameLog = player.game_log || [];
  _chartWin = 'all';

  const seasonAvg = safeNum(avgs[stat], 0);
  const defLine = Math.round(seasonAvg * 2) / 2;

  const opponent = _teamSide === 'home' ? _away : _home;

  const allVals = _gameLog.map(g => safeNum(g[stat], 0));
  const l5vals = allVals.slice(0, 5);
  const l10vals = allVals.slice(0, 10);

  function hr(arr, line) {
    return arr.length ? Math.round(arr.filter(v => v >= line).length / arr.length * 100) : 0;
  }

  const hrAll = hr(allVals, defLine);
  const hrL10 = hr(l10vals, defLine);
  const hrL5 = hr(l5vals, defLine);

  const venueGames = _venue
    ? _gameLog.filter(g => norm(g.venue) === norm(_venue))
    : [];

  const vsGames = opponent
    ? _gameLog.filter(g => norm(g.opponent) === norm(opponent))
    : [];

  const panel = document.getElementById('propChartPanel');

  panel.innerHTML = `
    <div style="background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:14px;overflow:hidden;">

      <div class="player-hdr-top">
        <div class="player-avatar">${esc((player.first_name || '')[0] || '')}${esc((player.last_name || '')[0] || '')}</div>
        <div style="flex:1;min-width:0;">
          <div class="player-hdr-name">${esc(player.name || '')}</div>
          <div class="player-hdr-meta">
            <span class="meta-pill">${esc(player.team || '')}</span>
            ${player.guernsey ? `<span class="meta-pill">#${esc(player.guernsey)}</span>` : ''}
            <span class="meta-pill">${player.games_played || 0} games</span>
            ${opponent ? `<span class="meta-pill" style="color:var(--accent);border-color:var(--border-accent);">vs ${esc(opponent)}</span>` : ''}
            ${_venue ? `<span class="meta-pill" style="color:#fbbf24;border-color:rgba(245,158,11,.3);">@ ${esc(_venue)}</span>` : ''}
          </div>
        </div>
      </div>

      <div class="player-stat-row">
        ${[
          ['DISP', avgs.disposals],
          ['KCK', avgs.kicks],
          ['HB', avgs.handballs],
          ['MRK', avgs.marks],
          ['TKL', avgs.tackles],
          ['GL', avgs.goals],
          ['FAN', avgs.afl_fantasy_score]
        ].map(([lbl, val]) => `
          <div class="psr-cell">
            <div class="psr-val">${safeNum(val, 0)}</div>
            <div class="psr-lbl">${lbl}</div>
          </div>
        `).join('')}
      </div>

      <div class="chart-controls">
        <select class="stat-select-btn" id="chartStatSel" onchange="onChartStatChange(this.value)">
          <option value="disposals" ${stat === 'disposals' ? 'selected' : ''}>Disposals</option>
          <option value="marks" ${stat === 'marks' ? 'selected' : ''}>Marks</option>
          <option value="kicks" ${stat === 'kicks' ? 'selected' : ''}>Kicks</option>
          <option value="tackles" ${stat === 'tackles' ? 'selected' : ''}>Tackles</option>
          <option value="goals" ${stat === 'goals' ? 'selected' : ''}>Goals</option>
          <option value="handballs" ${stat === 'handballs' ? 'selected' : ''}>Handballs</option>
        </select>
        <span class="hit-pill" id="hp-l5" onclick="setWin('l5')">L5 ${hrL5}%</span>
        <span class="hit-pill" id="hp-l10" onclick="setWin('l10')">L10 ${hrL10}%</span>
        <span class="hit-pill active" id="hp-all" onclick="setWin('all')">All ${hrAll}%</span>
        <span class="line-label">Line:</span>
        <input class="line-inp" type="number" id="propLineInp" value="${defLine}" step="0.5" oninput="redrawBars()">
      </div>

      <div class="chart-body" id="chartBody">
        <div id="propBarsContainer"></div>
        <div id="propXAxis"></div>
        <div id="propDashedLine"></div>
      </div>

      <div class="analysis-tabs">
        <button class="atab active" onclick="switchAtab('vs',this)">vs ${esc(opponent || 'Opp')} (${vsGames.length})</button>
        <button class="atab" onclick="switchAtab('last5',this)">Last 5</button>
        <button class="atab" onclick="switchAtab('split',this)">Home / Away</button>
        <button class="atab" onclick="switchAtab('venue',this)">Venue${_venue ? ' (' + venueGames.length + ')' : ''}</button>
      </div>

      <div id="apanel-vs" class="analysis-panel active">
        <div class="analysis-body">
          ${renderVsOpponentPanel(vsGames, stat, opponent)}
        </div>
      </div>

      <div id="apanel-last5" class="analysis-panel">
        <div class="analysis-body">
          ${renderLast5Panel(_gameLog.slice(0, 5), stat)}
        </div>
      </div>

      <div id="apanel-split" class="analysis-panel">
        <div class="analysis-body">
          ${renderSplitPanel(player, stat)}
        </div>
      </div>

      <div id="apanel-venue" class="analysis-panel">
        <div class="analysis-body">
          ${renderVenuePanel(venueGames, stat, _venue, _gameLog)}
        </div>
      </div>
    </div>
  `;

  redrawBars();
}

// ── Analysis panel renderers ─────────────────────────────────────

function renderVsOpponentPanel(games, stat, opponent) {
  if (!games.length) {
    return `<p style="font-size:12px;color:var(--text-muted);">No historical data vs ${esc(opponent || 'this opponent')}.</p>`;
  }

  const vals = games.map(g => safeNum(g[stat], 0));
  const avg = vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '—';
  const max = Math.max(...vals);
  const min = Math.min(...vals);

  return `
    <div style="display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;">
      <div style="background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:8px;padding:10px 16px;flex:1;min-width:90px;text-align:center;">
        <div style="font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--accent);">${avg}</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:2px;">Avg</div>
      </div>
      <div style="background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:8px;padding:10px 16px;flex:1;min-width:90px;text-align:center;">
        <div style="font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--text-primary);">${max}</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:2px;">Best</div>
      </div>
      <div style="background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:8px;padding:10px 16px;flex:1;min-width:90px;text-align:center;">
        <div style="font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--text-primary);">${min}</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:2px;">Low</div>
      </div>
      <div style="background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:8px;padding:10px 16px;flex:1;min-width:90px;text-align:center;">
        <div style="font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--text-primary);">${games.length}</div>
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:2px;">Games</div>
      </div>
    </div>
    <div class="scroll-x">
      <table class="atbl">
        <thead>
          <tr><th>Date</th><th>Rnd</th><th>Result</th><th>${esc(capStat(stat))}</th><th>Venue</th></tr>
        </thead>
        <tbody>
          ${games.map(g => `
            <tr>
              <td class="mono">${esc(g.date || '—')}</td>
              <td class="mono">${esc(g.round || '—')}</td>
              <td><span class="${g.result === 'W' ? 'win-dot' : 'loss-dot'}"></span> ${esc(g.result || '—')}</td>
              <td class="mono" style="font-weight:700;">${safeNum(g[stat], 0)}</td>
              <td style="font-size:11px;color:var(--text-muted);">${esc(g.venue || '—')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderLast5Panel(games, stat) {
  if (!games.length) {
    return '<p style="font-size:12px;color:var(--text-muted);">No recent game data.</p>';
  }

  return `
    <div class="scroll-x">
      <table class="atbl">
        <thead>
          <tr><th>Date</th><th>Rnd</th><th>Opponent</th><th>Result</th><th>${esc(capStat(stat))}</th><th>Disp</th><th>Marks</th><th>Kicks</th><th>Tackles</th></tr>
        </thead>
        <tbody>
          ${games.map(g => `
            <tr>
              <td class="mono">${esc(g.date || '—')}</td>
              <td class="mono">${esc(g.round || '—')}</td>
              <td style="font-weight:600;">${esc(g.opponent || '—')}</td>
              <td><span class="${g.result === 'W' ? 'win-dot' : 'loss-dot'}"></span> ${esc(g.result || '—')}</td>
              <td class="mono" style="font-weight:700;color:var(--accent);">${safeNum(g[stat], 0)}</td>
              <td class="mono">${safeNum(g.disposals, 0)}</td>
              <td class="mono">${safeNum(g.marks, 0)}</td>
              <td class="mono">${safeNum(g.kicks, 0)}</td>
              <td class="mono">${safeNum(g.tackles, 0)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function computeHomeAwaySplit(games, playerTeam, stat) {
  const homeGames = games.filter(g => norm(g.home_team) === norm(playerTeam));
  const awayGames = games.filter(g => norm(g.away_team) === norm(playerTeam));

  return {
    homeAvg: avgFromGames(homeGames, stat),
    homeGames: homeGames.length,
    homeBest: maxFromGames(homeGames, stat),
    awayAvg: avgFromGames(awayGames, stat),
    awayGames: awayGames.length,
    awayBest: maxFromGames(awayGames, stat),
  };
}

function renderSplitPanel(player, stat) {
  const split = computeHomeAwaySplit(_gameLog, player.team || '', stat);
  const l5 = safeNum(player.last5_avg?.[stat], 0);
  const l10 = safeNum(player.last10_avg?.[stat], 0);
  const seasonAvg = safeNum(player.averages?.[stat], 0);

  return `
    <div class="split-grid">
      <div class="split-card">
        <h6>🏠 Home</h6>
        <div class="split-stat"><span class="split-stat-lbl">Avg ${esc(stat)}</span><span class="split-stat-val">${split.homeAvg}</span></div>
        <div class="split-stat"><span class="split-stat-lbl">Games</span><span class="split-stat-val">${split.homeGames}</span></div>
        <div class="split-stat"><span class="split-stat-lbl">Best</span><span class="split-stat-val">${split.homeBest}</span></div>
      </div>
      <div class="split-card">
        <h6>✈️ Away</h6>
        <div class="split-stat"><span class="split-stat-lbl">Avg ${esc(stat)}</span><span class="split-stat-val">${split.awayAvg}</span></div>
        <div class="split-stat"><span class="split-stat-lbl">Games</span><span class="split-stat-val">${split.awayGames}</span></div>
        <div class="split-stat"><span class="split-stat-lbl">Best</span><span class="split-stat-val">${split.awayBest}</span></div>
      </div>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--text-muted);">
      Season avg:
      <span style="font-family:'DM Mono',monospace;color:var(--text-primary);">${seasonAvg}</span>
      · L5:
      <span style="font-family:'DM Mono',monospace;color:var(--text-primary);">${l5}</span>
      · L10:
      <span style="font-family:'DM Mono',monospace;color:var(--text-primary);">${l10}</span>
    </div>
  `;
}

function renderVenuePanel(venueGames, stat, venue, allGames) {
  const venues = [...new Set(allGames.map(g => g.venue || '').filter(Boolean))].sort();

  const tableHtml = venueGames.length
    ? `<div class="scroll-x"><table class="atbl">
        <thead><tr><th>Date</th><th>Rnd</th><th>Opponent</th><th>Result</th><th>${esc(capStat(stat))}</th></tr></thead>
        <tbody>${venueGames.map(g => `
          <tr>
            <td class="mono">${esc(g.date || '—')}</td>
            <td class="mono">${esc(g.round || '—')}</td>
            <td style="font-weight:600;">${esc(g.opponent || '—')}</td>
            <td><span class="${g.result === 'W' ? 'win-dot' : 'loss-dot'}"></span> ${esc(g.result || '—')}</td>
            <td class="mono" style="font-weight:700;color:var(--accent);">${safeNum(g[stat], 0)}</td>
          </tr>
        `).join('')}</tbody></table></div>`
    : `<p style="font-size:12px;color:var(--text-muted);">No games found at this venue in dataset.</p>`;

  const venueVals = venueGames.map(g => safeNum(g[stat], 0));
  const venueAvg = venueVals.length ? (venueVals.reduce((a, b) => a + b, 0) / venueVals.length).toFixed(1) : '—';

  return `
    <div class="venue-filter">
      <label>Filter venue:</label>
      <select class="form-select" style="max-width:260px;" onchange="filterByVenue(this.value)">
        <option value="${esc(venue || '')}">${venue ? esc(venue) + ' (match venue)' : 'All venues'}</option>
        ${venues.filter(v => norm(v) !== norm(venue)).map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('')}
      </select>
      ${venueGames.length ? `<span style="font-size:12px;color:var(--text-muted);">Avg: <strong style="font-family:'DM Mono',monospace;color:var(--text-primary);">${venueAvg}</strong> over ${venueGames.length} games</span>` : ''}
    </div>
    <div id="venueTableWrap">${tableHtml}</div>
  `;
}

function filterByVenue(venueStr) {
  const stat = document.getElementById('propStatSelect').value;
  const filtered = venueStr
    ? _gameLog.filter(g => norm(g.venue) === norm(venueStr))
    : _gameLog;

  const venueVals = filtered.map(g => safeNum(g[stat], 0));
  const venueAvg = venueVals.length ? (venueVals.reduce((a, b) => a + b, 0) / venueVals.length).toFixed(1) : '—';

  const wrap = document.getElementById('venueTableWrap');
  if (!wrap) return;

  wrap.innerHTML = filtered.length
    ? `<div style="margin-bottom:8px;font-size:12px;color:var(--text-muted);">Avg: <strong style="font-family:'DM Mono',monospace;color:var(--text-primary);">${venueAvg}</strong> over ${filtered.length} games</div>
       <div class="scroll-x"><table class="atbl">
        <thead><tr><th>Date</th><th>Rnd</th><th>Opponent</th><th>Result</th><th>${esc(capStat(stat))}</th><th>Venue</th></tr></thead>
        <tbody>${filtered.map(g => `
          <tr>
            <td class="mono">${esc(g.date || '—')}</td>
            <td class="mono">${esc(g.round || '—')}</td>
            <td style="font-weight:600;">${esc(g.opponent || '—')}</td>
            <td><span class="${g.result === 'W' ? 'win-dot' : 'loss-dot'}"></span> ${esc(g.result || '—')}</td>
            <td class="mono" style="font-weight:700;color:var(--accent);">${safeNum(g[stat], 0)}</td>
            <td style="font-size:11px;color:var(--text-muted);">${esc(g.venue || '—')}</td>
          </tr>
        `).join('')}</tbody></table></div>`
    : `<p style="font-size:12px;color:var(--text-muted);">No games at this venue.</p>`;
}

// ── Analysis tab switching ───────────────────────────────────────
function switchAtab(name, btn) {
  document.querySelectorAll('.analysis-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.atab').forEach(t => t.classList.remove('active'));
  document.getElementById(`apanel-${name}`)?.classList.add('active');
  btn?.classList.add('active');
}

// ── Chart stat change from within card ───────────────────────────
function onChartStatChange(val) {
  document.getElementById('propStatSelect').value = val;
  onStatChange();
}

// ── Chart window (L5/L10/All) ────────────────────────────────────
function setWin(win) {
  _chartWin = win;
  ['l5', 'l10', 'all'].forEach(w => {
    document.getElementById(`hp-${w}`)?.classList.toggle('active', w === win);
  });
  redrawBars();
}

// ── Bar chart renderer ───────────────────────────────────────────
function redrawBars() {
  const container = document.getElementById('propBarsContainer');
  const xAxis = document.getElementById('propXAxis');
  const dashedEl = document.getElementById('propDashedLine');
  if (!container || !_gameLog.length) return;

  const stat = document.getElementById('propStatSelect').value;
  const line = parseFloat(document.getElementById('propLineInp')?.value) || 0;

  let games = [..._gameLog].reverse();
  if (_chartWin === 'l5') games = games.slice(-5);
  if (_chartWin === 'l10') games = games.slice(-10);

  const vals = games.map(g => safeNum(g[stat], 0));
  const maxVal = Math.max(...vals, line, 1);

  container.innerHTML = '';
  xAxis.innerHTML = '';

  games.forEach(game => {
    const val = safeNum(game[stat], 0);
    const over = line > 0 ? val >= line : true;
    const barH = Math.max(Math.round((val / (maxVal * 1.1)) * 140), 3);

    const wrap = document.createElement('div');
    wrap.className = 'bar-wrap';

    const valLbl = document.createElement('div');
    valLbl.className = 'bar-val';
    valLbl.style.bottom = `${barH + 2}px`;
    valLbl.textContent = val;

    const bar = document.createElement('div');
    bar.className = `bar-rect ${over ? 'over' : 'under'}`;
    bar.style.height = `${barH}px`;
    bar.title = `${val} vs ${game.opponent || '?'} (${game.result || '?'}) ${game.date || ''}`;

    wrap.appendChild(valLbl);
    wrap.appendChild(bar);
    container.appendChild(wrap);

    const xl = document.createElement('div');
    xl.className = 'x-label';
    const opp = (game.opponent || '???').substring(0, 4).toUpperCase();
    xl.innerHTML = `<div>${esc(game.round || '')}</div><div>${esc(opp)}</div>`;
    xAxis.appendChild(xl);
  });

  if (dashedEl && line > 0) {
    const linePx = Math.round((line / (maxVal * 1.1)) * 140);
    const bottomPx = linePx + 22;
    dashedEl.style.bottom = `${bottomPx}px`;
    dashedEl.style.display = 'block';
  } else if (dashedEl) {
    dashedEl.style.display = 'none';
  }

  const allVals = _gameLog.map(g => safeNum(g[stat], 0));
  const l5v = allVals.slice(0, 5);
  const l10v = allVals.slice(0, 10);

  function hr(arr) {
    return arr.length ? Math.round(arr.filter(v => v >= line).length / arr.length * 100) : 0;
  }

  const hpL5 = document.getElementById('hp-l5');
  const hpL10 = document.getElementById('hp-l10');
  const hpAll = document.getElementById('hp-all');
  if (hpL5) hpL5.textContent = `L5 ${hr(l5v)}%`;
  if (hpL10) hpL10.textContent = `L10 ${hr(l10v)}%`;
  if (hpAll) hpAll.textContent = `All ${hr(allVals)}%`;
}

// ── Reset helpers ────────────────────────────────────────────────
function resetPlayerState() {
  _allPlayers = [];
  _selPlayerId = null;
  _selPlayer = null;
  _gameLog = [];

  document.getElementById('playerCount').textContent = '—';
  document.getElementById('propPlayerListInner').innerHTML =
    '<div class="prop-empty" style="padding:30px;"><p>Select a match</p></div>';

  resetChart();
}

function resetChart() {
  _selPlayerId = null;
  _selPlayer = null;
  _gameLog = [];

  document.getElementById('propChartPanel').innerHTML = `
    <div class="prop-empty" style="background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:12px;padding:60px 20px;">
      <i class="bi bi-bar-chart-fill"></i>
      <p>Select a player to see their prop chart</p>
    </div>
  `;
}

// ── Jump from fixtures tab ───────────────────────────────────────
function jumpToTeam(home, away, venue, side) {
  const playerTab = document.querySelector('.afl-tab[data-tab="players"]');
  switchTab('players', playerTab);

  _home = home;
  _away = away;
  _venue = venue;

  const sel = document.getElementById('matchSelector');
  for (const opt of sel.options) {
    if (opt.value.startsWith(`${home}|${away}`)) {
      sel.value = opt.value;
      break;
    }
  }

  const wrap = document.getElementById('teamTabsWrap');
  wrap.style.display = 'flex';
  document.getElementById('teamBtnHome').textContent = home;
  document.getElementById('teamBtnAway').textContent = away;

  selectTeam(side);
}

// ── Value finder ─────────────────────────────────────────────────
function loadValueFinder() {
  const el = document.getElementById('valueResults');
  const market = document.getElementById('valueMarket').value;
  const minEdge = document.getElementById('minEdge').value || 2;

  el.innerHTML = '<div class="prop-empty"><span class="spinner-sm"></span></div>';

  fetch(`/api/afl/value-finder?market=${encodeURIComponent(market)}&min_edge=${encodeURIComponent(minEdge)}&year=${_SEASON}`)
    .then(r => {
      if (!r.ok) throw new Error();
      return r.json();
    })
    .then(data => {
      if (!data.bets?.length) {
        el.innerHTML = '<div class="prop-empty"><i class="bi bi-lightning-charge"></i><p>No value bets found. Load Odds API props first.</p></div>';
        return;
      }

      const rows = data.bets.map(bet => {
        const edge = safeNum(bet.edge, 0);
        const cls = edge >= 2 ? 'pos' : edge <= -2 ? 'neg' : 'neu';

        return `
          <tr>
            <td style="font-weight:700;">${esc(bet.player || '')}</td>
            <td>${esc(bet.team || '')}</td>
            <td>${esc(bet.opponent || '')}</td>
            <td>${esc(bet.bookmaker || '')}</td>
            <td>${esc(bet.market || '')}</td>
            <td style="font-family:'DM Mono',monospace;">${safeNum(bet.book_line, 0)}</td>
            <td style="font-family:'DM Mono',monospace;">${safeNum(bet.season_avg, 0)}</td>
            <td style="font-family:'DM Mono',monospace;">${safeNum(bet.last5_avg, 0)}</td>
            <td style="font-family:'DM Mono',monospace;">${safeNum(bet.hist_pct, 0)}%</td>
            <td style="font-family:'DM Mono',monospace;">${safeNum(bet.model_prediction, 0)}</td>
            <td><span class="edge-chip ${cls}">${edge > 0 ? '+' : ''}${edge}</span></td>
          </tr>
        `;
      }).join('');

      el.innerHTML = `
        <div class="scroll-x">
          <table class="value-table">
            <thead>
              <tr><th>Player</th><th>Team</th><th>Opp</th><th>Book</th><th>Market</th><th>Line</th><th>Season</th><th>L5</th><th>Hit%</th><th>Model</th><th>Edge</th></tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    })
    .catch(() => {
      el.innerHTML = '<div class="prop-empty" style="color:var(--danger);">Value finder failed.</div>';
    });
}

// ── Global refresh ───────────────────────────────────────────────
function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  if (!btn) return;

  btn.innerHTML = '<span class="spinner-sm"></span>';
  btn.disabled = true;

  fetch('/api/afl/refresh', { method: 'POST' })
    .then(r => {
      if (!r.ok) throw new Error();
      window.location.reload();
    })
    .catch(() => {
      btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Refresh';
      btn.disabled = false;
    });
}
</script>
