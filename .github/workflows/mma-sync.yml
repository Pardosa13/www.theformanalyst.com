name: MMA Weekly Sync

# Runs every Sunday at 9am UTC (matches Railway cron 0 9 * * 0).
# Can also be triggered manually via the GitHub Actions UI.
on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mma-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MMA sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python mma_sync.py

      # Read-only accuracy report over completed fights that had a real
      # (non-fallback) prediction — no model training happens here. Never
      # blocks the sync job; a failure here shouldn't fail the whole run.
      - name: Log MMA prediction accuracy
        if: always()
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python mma_backtest.py --report --save
