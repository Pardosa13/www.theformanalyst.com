name: MMA Weekly Sync

# Runs every Sunday at 9am UTC (matches Railway cron 0 9 * * 0).
# Can also be triggered manually via the GitHub Actions UI.
on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

jobs:
  mma-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MMA sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python mma_sync.py
