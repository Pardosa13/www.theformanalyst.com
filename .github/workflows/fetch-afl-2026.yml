name: Fetch AFL 2026 Stats

on:
  schedule:
    # 10:00 UTC (8pm AEST) — catches overnight/morning results
    - cron: '0 10 * * *'
    # 22:00 UTC (8am AEST next day) — catches Saturday/Sunday evening games
    # that finish after the 10:00 UTC run, ensuring weekend round stats are
    # committed before the Railway cron settlement job runs at 02:00 UTC.
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('fitzRoy','readr','dplyr','httr','httr2','rvest','tidyr','janitor'), repos='https://cloud.r-project.org')"

      - name: Create data directory
        run: mkdir -p data data/cache

      - name: Fetch 2026 player stats
        # The R logic lives in scripts/fetch_afl_2026_stats.R.
        # Keeping it in a file (rather than inline via Rscript -e "...") avoids
        # bash interpreting backtick-quoted R identifiers (e.g. `%||%`) as
        # command substitution inside the double-quoted string, which previously
        # caused "Error: unexpected assignment in ' <-'" and workflow failures.
        run: Rscript scripts/fetch_afl_2026_stats.R

      - name: Commit and push if changed
        run: |
          if [ ! -f /tmp/afl_2026_stats_rows.txt ]; then
            echo "No valid output marker found; skipping commit."
            exit 0
          fi
          ROW_COUNT="$(cat /tmp/afl_2026_stats_rows.txt)"
          if [ -z "$ROW_COUNT" ] || [ "$ROW_COUNT" -le 0 ]; then
            echo "Output row count invalid ($ROW_COUNT); skipping commit."
            exit 0
          fi
          if [ ! -s data/afl_2026_stats.csv ]; then
            echo "Output file missing or empty; skipping commit."
            exit 0
          fi
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/afl_2026_stats.csv data/cache/player_mapping_afltables.csv
          git diff --cached --quiet && exit 0
          git commit -m "Update AFL 2026 stats"
          git push
