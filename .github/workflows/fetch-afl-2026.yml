name: Fetch AFL 2026 Stats

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('fitzRoy','readr','dplyr','httr','httr2','rvest','tidyr','janitor'), repos='https://cloud.r-project.org')"

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch 2026 player stats (fryzigg then afltables fallback)
        run: |
          Rscript -e "
          library(fitzRoy)
          library(readr)

          data <- tryCatch({
            # Prefer fryzigg: stable player_id values consistent with 2019-2025 data.
            d <- fetch_player_stats(season = 2026, source = 'fryzigg')
            if (is.null(d) || nrow(d) == 0) stop('fryzigg returned 0 rows')
            cat('Source: fryzigg\n')
            d
          }, error = function(e) {
            cat('fryzigg failed:', conditionMessage(e), '— falling back to afltables\n')
            d <- fetch_player_stats(season = 2026, source = 'afltables')
            if (is.null(d) || nrow(d) == 0) stop('afltables also returned 0 rows')
            cat('Source: afltables\n')
            d
          })

          write_csv(data, 'data/afl_2026_stats.csv')
          cat('Rows written:', nrow(data), '\n')
          cat('Cols written:', ncol(data), '\n')
          print(names(data))
          "

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/afl_2026_stats.csv
          git diff --cached --quiet && exit 0
          git commit -m "Update AFL 2026 stats"
          git push
