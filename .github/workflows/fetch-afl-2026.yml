name: Fetch AFL 2026 Stats

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install R and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y r-base r-base-dev libcurl4-openssl-dev libssl-dev libxml2-dev
      
      - name: Install R packages
        run: |
          sudo R --slave -e "
          install.packages(c('httr', 'httr2', 'rvest', 'tidyr', 'janitor'), repos='http://cran.r-project.org')
          remotes::install_github('jimmyday12/fitzRoy')
          "
      
      - name: Fetch data
        run: |
          sudo R --slave -e "
          library(fitzRoy)
          data <- fetch_player_stats(season = 2026, source = 'afltables')
          write.csv(data, 'data/afl_2026_stats.csv', row.names = FALSE)
          "
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/afl_2026_stats.csv
          git commit -m "Update AFL 2026 stats" || true
          git push
